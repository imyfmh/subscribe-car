<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="订阅拼车平台，支持 Apple One、Apple Music、iCloud 多区域拼车发布、筛选和联系。"
    />
    <meta
      name="keywords"
      content="拼车,订阅拼车,Apple One,Apple Music,iCloud,Supabase,GitHub Pages"
    />
    <meta name="theme-color" content="#152132" />
    <title>订阅拼车站</title>
    <script type="text/javascript">
      (function (l) {
        var repoBase = '/subscribe-car';
        var docsBase = repoBase + '/docs';
        var isGitHubPages = l.hostname === 'imyfmh.github.io' || /github\.io$/.test(l.hostname);

        if (isGitHubPages && !l.pathname.startsWith(docsBase)) {
          var suffix = l.pathname.startsWith(repoBase) ? l.pathname.slice(repoBase.length) : l.pathname;
          var normalizedSuffix = suffix === '/' ? '/' : suffix;
          l.replace(docsBase + normalizedSuffix + l.search + l.hash);
        }
      })(window.location);
    </script>
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
